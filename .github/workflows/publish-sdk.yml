name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish-sdk:
    name: Publish SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build SDK
        run: pnpm build --filter=@cronicorn/sdk

      - name: Update SDK version
        run: |
          cd packages/sdk  # or wherever your SDK is located
          npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Publish SDK
        run: |
          cd packages/sdk
          npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
